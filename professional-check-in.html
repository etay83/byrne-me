<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Work Day Check-In</title>
    <!-- Tailwind CSS for clean layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 18 & Babel for a native, unminified, highly editable browser experience -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #faf8f5; /* warmWhite */
            margin: 0;
            line-height: inherit;
        }
        /* Custom scrollbars matching the color palette */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #F5F3EF; /* cream */
        }
        ::-webkit-scrollbar-thumb {
            background: #bdb7a2; /* stone */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6d7873; /* warmGrey */
        }
        /* Style range sliders uniformly */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: #bdb7a2;
            height: 6px;
            border-radius: 9999px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out both; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        /* STREAMING_CHUNK:Configuring custom earth-toned design tokens... */
        const m = {

        const cyclePhases = [

        const energyStealersConfig = [

            { id: "solo_parenting", label: "Solo Parenting (Morning Only)" },

        const morningChecklistTasks = [
            "Create Meet links for clients",
            "Update host settings",
            "Review clinical notes",

        ];

        const shutdownChecklistTasks = [
            "Complete progress notes",

        const defaultState = {
            mode: "workday",
            page: 1, // 1: Flight Deck, 2: Ops Sandbox, 3: Client Directory
            cyclePhase: "luteal",

            eveningPlan: "cook",
            coreFocus: "",
            morningChecklist: [false, false, false, false],
            avs: 5,
            utilization: 3,
            sessions: [
                { time: "09:00 AM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "10:15 AM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "11:30 AM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "01:00 PM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },

        /* STREAMING_CHUNK:Declaring native SVG icons for UI performance... */
        const Icons = {

                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
            ),

            ),

            ),

                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            ),
            Thermometer: ({ size = 16, color = "currentColor" }) => (

            ),
            TriangleAlert: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            ),
            Plus: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            ),
            Trash2: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            ),
            Zap: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            ),
            Heart: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            ),
            BookOpen: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            ),
            Camera: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3"/></svg>
            ),
            Sparkles: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            )
        };

        function getAVSFeedback(avs) {
            if (avs <= 2) {
                return { color: m.iceBlue, label: "Vagal Collapse / Freeze State", sub: "Complete energetic depletion, hypo-arousal, or executive shutdown. Cease administrative output. Passive sensory restoration required." };
            } else if (avs <= 4) {
                return { color: m.calmTeal, label: "Parasympathetic Restoration", sub: "Autonomic safety, physiological recovery, and active decompression." };
            } else if (avs <= 6) {
                return { color: m.forest, label: "Ventral Vagal Flow State", sub: "The optimal baseline sweet spot. High empathy retention, fluid communication, and balanced focus." };
            } else if (avs <= 8) {
                return { color: m.gold, label: "Sympathetic Mobilization", sub: "Rising cognitive friction, sensory hyper-awareness, or low-level anxiety. Enforce transition recovery timers." };
            } else {
                return { color: m.terracotta, label: "Sympathetic Overdrive / Autonomic Conflict", sub: "Fight/flight activation, high sensory fatigue, or acute neurodivergent burnout. Trigger automatic professional lockout, mandating strict sensory isolation." };
            }
        }

        function getUtilFeedback(level) {
            const labels = ["Underloaded", "Buffer", "Sweet Spot", "Max Capacity", "Overload"];
            const colors = [m.stone, m.forest, m.gold, m.terracotta, m.darkForest];
            return {
                label: labels[level - 1] || "Unknown",
                color: colors[level - 1] || m.stone
            };
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMsg: "" };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorMsg: String(error) };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: 40, color: m.terracotta, fontFamily: "system-ui, sans-serif" }}>
                            <h2 style={{ color: m.darkForest }}>Cockpit Render Error</h2>
                            <pre style={{ background: m.cream, padding: 16, borderRadius: 8, overflow: "auto" }}>{this.state.errorMsg}</pre>
                            <p style={{ marginTop: 12, color: m.warmGrey }}>Try resetting local state or clear localStorage.</p>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        /* STREAMING_CHUNK:Initializing state engines... */
        function App() {
            const [state, setState] = React.useState(() => {
                try {
                    const saved = localStorage.getItem("cockpit-v2");
                    if (saved) {
                        return { ...defaultState, ...JSON.parse(saved) };
                    }
                } catch (e) {
                    console.error("Local load failed", e);
                }
                return defaultState;
            });

            const [inlineMessage, setInlineMessage] = React.useState(null);

            React.useEffect(() => {
                try {
                    localStorage.setItem("cockpit-v2", JSON.stringify(state));
                } catch (e) {
                    console.error("Local save failed", e);
                }
            }, [state]);

            const updateState = (update) => setState(prev => ({ ...prev, ...update }));

            const updateSession = (idx, update) => setState(prev => {
                const sessions = prev.sessions.map((s, sIdx) => sIdx === idx ? { ...s, ...update } : s);
                return { ...prev, sessions };
            });

            const updateCapsule = (update) => setState(prev => ({
                ...prev,
                capsule: { ...prev.capsule, ...update }
            }));

            const toggleSymptom = (key) => setState(prev => ({
                ...prev,
                symptoms: { ...prev.symptoms, [key]: !prev.symptoms[key] }
            }));

            // Automated Endocrine Load scoring logic based on symptom checklist tally
            const activeSymptomCount = [
                state.symptoms.pain,
                state.symptoms.sleep,
                state.symptoms.sensory,
                state.symptoms.fog,
                state.symptoms.bleeding
            ].filter(Boolean).length;

            const computedEndocrineLoad = activeSymptomCount === 0 ? 1.0 : activeSymptomCount <= 2 ? 2.0 : 3.0;

            // Endocrine Calculations
            const endocrinePhaseMod = (cyclePhases.find(p => p.id === state.cyclePhase) || cyclePhases[0]).modifier;
            const dragCoefficient = endocrinePhaseMod * computedEndocrineLoad;

            // Dynamic CCF Target calculation (Somatic Safeguard Override)
            let standardCeiling = 10.0;
            let dynamicCeiling = standardCeiling;
            if (state.energyStealers.includes("solo_parenting")) {
                dynamicCeiling -= 1.5;
            }
            if (dragCoefficient >= 3.0) {
                dynamicCeiling = Math.min(dynamicCeiling, 8.0);
            }
            dynamicCeiling = Math.max(6.0, dynamicCeiling);

            // Live CCF Cumulative Sum
            const ccfLoad = state.sessions.reduce((sum, s) => {
                if (s.ghost || !s.clientId) return sum;
                const client = state.clients.find(c => c.id === s.clientId);
                if (!client) return sum;
                const multiplier = s.intensity === "elevated" ? 1.3 : s.intensity === "crisis" ? 1.6 : 1.0;
                return sum + (client.weight * multiplier);
            }, 0);

            const ccfPercentage = Math.min(100, dynamicCeiling > 0 ? (ccfLoad / dynamicCeiling) * 100 : 0);
            const ccfColor = ccfLoad > dynamicCeiling ? m.terracotta : ccfLoad > (dynamicCeiling * 0.85) ? m.gold : m.forest;

            // Back-to-Back High Intensity Clinical Safeguard warning
            const consecutiveHighRisk = React.useMemo(() => {
                let lastIntensity = false;
                for (let s of state.sessions) {
                    if (s.ghost || !s.clientId) {
                        lastIntensity = false;
                        continue;
                    }
                    const client = state.clients.find(c => c.id === s.clientId);
                    if (client) {
                        const weight = client.weight * (s.intensity === "elevated" ? 1.3 : s.intensity === "crisis" ? 1.6 : 1.0);
                        if (weight >= 2.5) {
                            if (lastIntensity) return true;
                            lastIntensity = true;
                        } else {
                            lastIntensity = false;
                        }
                    }
                }
                return false;
            }, [state.sessions, state.clients]);

            const avsFeedback = getAVSFeedback(state.avs || 5);
            const utilFeedback = getUtilFeedback(state.utilization || 3);
            const unwrittenNotesCount = state.sessions.filter(s => s.clientId && !s.ghost && !s.noteWritten).length;

            const [newClientName, setNewClientName] = React.useState("");
            const [newClientWeight, setNewClientWeight] = React.useState(2);
            const [rosterExpanded, setRosterExpanded] = React.useState(false);

            const addClient = () => {
                if (!newClientName.trim()) {
                    setInlineMessage({ type: "error", text: "Please enter client initials first." });
                    return;
                }
                const newId = `client_${Date.now()}`;
                const added = { id: newId, name: `${newClientName.trim()} (Tier ${newClientWeight})`, weight: Number(newClientWeight) };
                updateState({ clients: [...state.clients, added] });
                setNewClientName("");
                setInlineMessage({ type: "success", text: "Client added to local directory." });
            };

            const removeClient = (clientId) => {
                const filtered = state.clients.filter(c => c.id !== clientId);
                const cleanedSessions = state.sessions.map(s => s.clientId === clientId ? { ...s, clientId: "" } : s);
                updateState({ clients: filtered, sessions: cleanedSessions });
                setInlineMessage({ type: "success", text: "Client removed." });
            };

            /* STREAMING_CHUNK:Constructing YAML markdown export generator... */
            const compiledMarkdown = React.useMemo(() => {
                const today = new Date().toISOString().split("T")[0];
                const escapeQuotes = str => (str || "").replace(/"/g, '\\"');
                
                // Intentional Fallback assignments
                const nowSpinningVal = state.capsule.mediaEnabled ? escapeQuotes(state.capsule.media || "") : "intentional_silence";
                const currentHyperfocusVal = state.capsule.hyperfocusEnabled ? escapeQuotes(state.capsule.hyperfocus || "") : "cognitive_rest";
                const currentBookVal = state.capsule.readEnabled ? escapeQuotes(state.capsule.currentBook || "") : "cognitive_rest";
                const activeCourseVal = state.capsule.courseEnabled ? escapeQuotes(state.capsule.activeCourse || "") : "cognitive_rest";
                const dailyEventVal = state.capsule.dayAnchorEnabled ? escapeQuotes(state.capsule.dayAnchor || "") : "standard_routine_day";

                return [
                    "---",
                    `date: ${today}`,
                    `weekend_mode: ${state.mode === "weekend"}`,
                    `cycle_phase: ${state.cyclePhase}`,
                    `endocrine_load: ${computedEndocrineLoad}`,
                    `somatic_drag_coefficient: ${dragCoefficient.toFixed(1)}`,
                    `autonomic_variance_score: ${state.avs}`,
                    `morning_focus: "${escapeQuotes(state.coreFocus || "")}"`,
                    "energy_stealers:",
                    ...(state.energyStealers || []).map(s => `  - ${s}`),
                    "logged_somatic_symptoms:",
                    ...(Object.keys(state.symptoms).filter(k => state.symptoms[k]).map(k => `  - ${k}`)),
                    "family_household:",
                    `  morning_dropoff: "${state.morningDropoff}"`,
                    `  evening_energy_plan: "${state.eveningPlan}"`,
                    `sessions_scheduled: ${state.sessions.filter(s => s.clientId && !s.ghost).length}`,
                    `sessions_completed: ${state.sessions.filter(s => s.clientId && !s.ghost).length}`,
                    `ghost_sessions: ${state.sessions.filter(s => s.ghost).length}`,
                    `caseload_complexity_factor: ${ccfLoad.toFixed(1)}`,
                    `max_daily_ccf_threshold: ${dynamicCeiling.toFixed(1)}`,
                    `notes_written_today: ${state.sessions.filter(s => s.noteWritten).length}`,
                    `notes_remaining_debt: ${unwrittenNotesCount}`,
                    `workday_completed: ${state.shutdownChecklist.every(Boolean)}`,
                    `now_spinning: "${nowSpinningVal}"`,
                    `current_hyperfocus: "${currentHyperfocusVal}"`,
                    `current_book: "${currentBookVal}"`,
                    `active_course: "${activeCourseVal}"`,
                    `daily_event: "${dailyEventVal}"`,
                    "---",
                    "",
                    `**[#${today}-Somatic-Log]**`,
                    `*   **Somatic Status:** Endocrine load auto-tallied at **${computedEndocrineLoad.toFixed(1)}** (${activeSymptomCount} symptoms). True biological drag coefficient calculated at **${dragCoefficient.toFixed(1)}** with an Autonomic Variance Score of **${state.avs}/10**. ${dragCoefficient >= 3.0 ? "Luteal sensory override safeguard active." : "Operating inside normal somatic load margins."}`,
                    `*   **Intellectual & Temporal Artifacts:** Anchored today's timeline via **"${state.capsule.dayAnchorEnabled && state.capsule.dayAnchor ? escapeQuotes(state.capsule.dayAnchor) : "standard_routine_day"}"**. Active hyperfocus captured under **"${currentHyperfocusVal}"**.`
                ].join("\n");
            }, [state, dragCoefficient, computedEndocrineLoad, activeSymptomCount, ccfLoad, dynamicCeiling, unwrittenNotesCount]);

            const [copied, setCopied] = React.useState(false);
            const handleCopy = () => {
                try {
                    const el = document.createElement('textarea');
                    el.value = compiledMarkdown;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (e) {
                    console.error("Copy block failed", e);
                }
            };

            const toggleEnergyStealer = (id) => {
                const stealers = new Set(state.energyStealers || []);
                if (stealers.has(id)) stealers.delete(id);
                else stealers.add(id);
                updateState({ energyStealers: Array.from(stealers) });
            };

            const toggleMorningTask = (idx) => {
                const morningChecklist = [...state.morningChecklist];
                morningChecklist[idx] = !morningChecklist[idx];
                updateState({ morningChecklist });
            };

            const toggleShutdownTask = (idx) => {
                const shutdownChecklist = [...state.shutdownChecklist];
                shutdownChecklist[idx] = !shutdownChecklist[idx];
                updateState({ shutdownChecklist });
            };

            const resetCockpit = () => {
                updateState(defaultState);
                setInlineMessage({ type: "info", text: "Dashboard returned to default workday baselines." });
            };

            const btnBaseStyle = {
                cursor: "pointer",
                border: "none",
                borderRadius: 8,
                padding: "8px 16px",
                fontSize: 14,
                transition: "all 0.2s ease"
            };

            const cardStyle = {
                backgroundColor: m.cream,
                border: `1px solid ${m.stone}`,
                borderRadius: 12,
                padding: 20
            };

            const textHeaderStyle = {
                fontFamily: 'Georgia, "Times New Roman", serif',
                color: m.darkForest,
                fontWeight: 600
            };

            // Unified, consistent tabs navigation style matching somatic check-in pages
            const tabStyle = (isActive) => ({
                cursor: "pointer",
                padding: "10px 16px",
                fontSize: 14,
                fontWeight: 600,
                borderRadius: "8px 8px 0 0",
                border: `1px solid ${m.stone}`,
                borderBottom: isActive ? `1px solid ${m.cream}` : `1px solid ${m.stone}`,
                backgroundColor: isActive ? m.cream : "transparent",
                color: isActive ? m.darkForest : m.warmGrey,
                transition: "all 0.15s ease",
                marginBottom: "-1px",
                marginRight: "4px",
                position: "relative",
                zIndex: isActive ? 10 : 1
            });

            // Dynamic progress-bar filling track style generator for active visual response
            const getSliderStyle = (val, min, max, baseColor) => {
                const pct = ((val - min) / (max - min)) * 100;
                return {
                    background: `linear-gradient(to right, ${baseColor} 0%, ${baseColor} ${pct}%, #e5e7eb ${pct}%, #e5e7eb 100%)`,
                    height: "8px",
                    borderRadius: "9999px",
                    outline: "none",
                    width: "100%",
                    color: baseColor
                };
            };

            return (
                <div style={{ minHeight: "100vh", backgroundColor: m.warmWhite, color: m.warmGrey, fontFamily: "system-ui, -apple-system, sans-serif" }} className="pb-24">
                    
                    {/* GLOBAL MASTER HEADER */}
                    <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", borderBottom: `1px solid ${m.stone}` }}>
                        <div>
                            <h1 style={{ ...textHeaderStyle, fontSize: 22, margin: 0 }}>Second Arrow Cockpit</h1>
                            <p style={{ fontSize: 12, color: m.coolGrey, margin: "4px 0 0" }}>
                                {new Date().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}
                            </p>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <button onClick={resetCockpit} style={{ ...btnBaseStyle, backgroundColor: "transparent", color: m.warmGrey, border: `1px solid ${m.stone}` }} title="Reset Day">
                                <Icons.RotateCcw size={16} />
                            </button>
                            <button 
                                onClick={() => updateState({ mode: state.mode === "workday" ? "weekend" : "workday" })} 
                                style={{ ...btnBaseStyle, backgroundColor: state.mode === "workday" ? m.forest : m.gold, color: m.warmWhite }}
                            >
                                {state.mode === "workday" ? (
                                    <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                        <Icons.Sun size={16} /> Workday
                                    </span>
                                ) : (
                                    <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                        <Icons.Moon size={16} /> Weekend
                                    </span>
                                )}
                            </button>
                        </div>
                    </header>

                    {/* DYNAMIC CONTEXTUAL BANNER ALERTS */}
                    <div style={{ maxWidth: 720, margin: "16px auto 0", padding: "0 16px" }}>
                        {inlineMessage && (
                            <div className="p-3 mb-3 rounded-lg text-xs font-semibold flex justify-between items-center transition"
                                 style={{ 
                                     backgroundColor: inlineMessage.type === "error" ? "rgba(182, 141, 118, 0.15)" : "rgba(69, 115, 93, 0.12)", 
                                     color: inlineMessage.type === "error" ? m.terracotta : m.darkForest,
                                     border: `1px solid ${inlineMessage.type === "error" ? m.terracotta : m.forest}`
                                 }}>
                                <span>{inlineMessage.text}</span>
                                <button onClick={() => setInlineMessage(null)} className="font-bold underline ml-2">Dismiss</button>
                            </div>
                        )}

                        {consecutiveHighRisk && state.mode === "workday" && (
                            <div style={{ padding: "12px 16px", borderRadius: 8, backgroundColor: "rgba(182, 141, 118, 0.15)", color: m.terracotta, border: `1px solid ${m.terracotta}`, display: "flex", alignItems: "center", gap: 10, fontSize: 13, marginBottom: 12 }}>
                                <Icons.TriangleAlert size={18} color={m.terracotta} />
                                <div>
                                    <strong style={{ fontStyle: "normal", fontWeight: 600 }}>Somatic Boundary Alert:</strong> Back-to-Back high complexity clinical sessions detected (Tier 3 or crisis modifiers). Mandating a 15-minute sensory isolation recovery window.
                                </div>
                            </div>
                        )}

                        {unwrittenNotesCount > 0 && state.mode === "workday" && state.shutdownChecklist.every(Boolean) && !state.weekendDebtCarryover && (
                            <div style={{ padding: "12px 16px", borderRadius: 8, backgroundColor: "rgba(186, 148, 94, 0.15)", color: m.gold, border: `1px solid ${m.gold}`, display: "flex", flexDirection: "column", gap: 8, fontSize: 13, marginBottom: 12 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <Icons.TriangleAlert size={18} color={m.gold} />
                                    <div>
                                        <strong style={{ fontStyle: "normal", fontWeight: 600 }}>Friday Safeguard Prompt:</strong> You have {unwrittenNotesCount} pending notes. To safely seal your afternoon airlock with unresolved documentation debt, you must validate weekend carryover.
                                    </div>
                                </div>
                                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", marginTop: 4, padding: "4px 8px", backgroundColor: "rgba(255,255,255,0.4)", borderRadius: 4 }}>
                                    <input 
                                        type="checkbox" 
                                        checked={state.weekendDebtCarryover}
                                        onChange={(e) => updateState({ weekendDebtCarryover: e.target.checked })}
                                        style={{ accentColor: m.gold }}
                                    />
                                    <span>I acknowledge carrying {unwrittenNotesCount} unwritten clinical progress notes into my recovery weekend.</span>
                                </label>
                            </div>
                        )}
                    </div>

                    {/* THREE-TAB PROFESSIONAL NAVIGATION FRAMEWORK */}
                    <div style={{ maxWidth: 720, margin: "24px auto 0", padding: "0 16px" }}>
                        <div className="flex border-b" style={{ borderColor: m.stone }}>
                            <button onClick={() => updateState({ page: 1 })} style={tabStyle(state.page === 1)}>
                                <span className="flex items-center gap-1.5"><Icons.Activity size={14} /> Clinical Flight Deck</span>
                            </button>
                            <button onClick={() => updateState({ page: 2 })} style={tabStyle(state.page === 2)}>
                                <span className="flex items-center gap-1.5"><Icons.FileText size={14} /> Operations Sandbox</span>
                            </button>
                            <button onClick={() => updateState({ page: 3 })} style={tabStyle(state.page === 3)}>
                                <span className="flex items-center gap-1.5"><Icons.Calendar size={14} /> Client Directory</span>
                            </button>
                        </div>

                        {/* CONTENT WRAPPER WITH PRECISE BORDER CONNECTIVITY TO MASK TAB GAPS */}
                        <div className="p-5 border rounded-b-xl rounded-tr-xl space-y-6 animate-fadeIn" style={{ borderColor: m.stone, backgroundColor: m.cream }}>
                            
                            {/* TAB 1: CLINICAL FLIGHT DECK */}
                            {state.page === 1 && (
                                <React.Fragment>
                                    
                                    {/* WEEKEND LAYOUT CONTAINER */}
                                    {state.mode === "weekend" && (
                                        <div style={{ ...cardStyle, backgroundColor: m.warmWhite, border: `1px solid ${m.stone}`, textAlign: "center", padding: 40 }} className="space-y-4">
                                            <Icons.Moon size={40} color={m.gold} className="mx-auto" />
                                            <h2 style={{ ...textHeaderStyle, fontSize: 20, margin: 0 }}>Clinical Telemetry Rest-State Active</h2>
                                            <p style={{ color: m.warmGrey, fontSize: 14 }}>
                                                Nervous system operations suspended. Safeguard baseline enabled. Enjoy your restorative weekend block.
                                            </p>
                                        </div>
                                    )}

                                    {state.mode === "workday" && (
                                        <React.Fragment>
                                            
                                            {/* AUTOMATED ENDOCRINE WEATHER CARD */}
                                            <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-4" style={{ borderColor: m.stone }}>
                                                <div className="flex items-center justify-between border-b pb-2 border-stone/30">
                                                    <h3 style={{ ...textHeaderStyle, fontSize: 16 }} className="flex items-center gap-1.5">
                                                        <Icons.Sun size={18} color={m.gold} /> Endocrine Climate Sync
                                                    </h3>
                                                    <span className="text-xs px-2 py-0.5 rounded-full font-bold uppercase" style={{ backgroundColor: "rgba(182, 141, 118, 0.15)", color: m.terracotta }}>
                                                        Phase: {state.cyclePhase}
                                                    </span>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-[10px] uppercase font-bold text-slate-400">Current Phase Modifier</label>
                                                        <span className="text-sm font-semibold text-slate-700">{endocrinePhaseMod.toFixed(1)}x</span>
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] uppercase font-bold text-slate-400">Auto Endocrine Load (Check-In Sync)</label>
                                                        <span className="text-sm font-semibold text-slate-700">{computedEndocrineLoad.toFixed(1)}</span>
                                                    </div>
                                                </div>

                                                {/* QUICK-TAP DYNAMIC SYMPTOM MARKS */}
                                                <div className="space-y-2 pt-2 border-t border-stone/20">
                                                    <label className="block text-[10px] uppercase font-bold text-slate-400">Telemetry Symptom Checklist (Taps influence Load &amp; β values)</label>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {[
                                                            { key: "pain", label: "Pain / Cramps" },
                                                            { key: "sleep", label: "Sleep Disruption" },
                                                            { key: "sensory", label: "Sensory High" },
                                                            { key: "fog", label: "Brain Fog" },
                                                            { key: "bleeding", label: "Menstruation Flow" }
                                                        ].map(sym => {
                                                            const isChecked = state.symptoms[sym.key];
                                                            return (
                                                                <button
                                                                    key={sym.key}
                                                                    onClick={() => toggleSymptom(sym.key)}
                                                                    className="px-2 py-1 text-[11px] font-semibold border rounded-full transition"
                                                                    style={{
                                                                        borderColor: isChecked ? m.terracotta : m.stone,
                                                                        backgroundColor: isChecked ? "rgba(182, 141, 118, 0.15)" : m.warmWhite,
                                                                        color: isChecked ? m.darkForest : m.warmGrey
                                                                    }}
                                                                >
                                                                    {isChecked && "✓ "} {sym.label}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                </div>

                                                <div className="p-2.5 rounded-lg text-xs" style={{ backgroundColor: dragCoefficient >= 3.0 ? "rgba(182,141,118,0.12)" : "rgba(69,115,93,0.08)", border: `1px solid ${dragCoefficient >= 3.0 ? m.terracotta : m.forest}` }}>
                                                    <span className="font-bold">Computed Drag Coefficient (β): {dragCoefficient.toFixed(1)}</span>
                                                    {dragCoefficient >= 3.0 && <p className="mt-0.5 text-slate-500">Safeguard Override active: professional CCF capacity limited to 8.0</p>}
                                                </div>
                                            </section>

                                            {/* AUTONOMIC VARIANCE SCORE (AVS) GAUGE */}
                                            <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-3" style={{ borderColor: m.stone }}>
                                                <div className="flex justify-between items-center">
                                                    <h3 style={{ ...textHeaderStyle, fontSize: 16 }} className="flex items-center gap-1.5">
                                                        <Icons.Activity size={18} color={m.forest} /> Autonomic Status
                                                    </h3>
                                                    <span className="text-xl font-bold" style={{ color: avsFeedback.color }}>{state.avs}/10</span>
                                                </div>
                                                <input 
                                                    type="range" min="1" max="10" 
                                                    value={state.avs} 
                                                    onChange={e => updateState({ avs: Number(e.target.value) })}
                                                    style={getSliderStyle(state.avs, 1, 10, avsFeedback.color)}
                                                    className="w-full"
                                                />
                                                <div style={{ backgroundColor: avsFeedback.color + "20" }} className="p-3 rounded-lg text-xs space-y-1">
                                                    <span className="font-bold text-slate-800">{avsFeedback.label}</span>
                                                    <p className="text-slate-600 leading-relaxed">{avsFeedback.sub}</p>
                                                </div>
                                            </section>

                                            {/* CLINICIAN UTILIZATION METER */}
                                            <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-3" style={{ borderColor: m.stone }}>
                                                <h3 style={{ ...textHeaderStyle, fontSize: 16 }}>Clinician Utilization Volume</h3>
                                                <div className="grid grid-cols-5 gap-1.5">
                                                    {[1, 2, 3, 4, 5].map(level => {
                                                        const uFeed = getUtilFeedback(level);
                                                        const active = state.utilization === level;
                                                        return (
                                                            <button
                                                                key={level}
                                                                onClick={() => updateState({ utilization: level })}
                                                                className="p-1.5 border rounded-lg text-[10px] font-bold text-center transition"
                                                                style={{
                                                                    borderColor: active ? uFeed.color : m.stone,
                                                                    backgroundColor: active ? uFeed.color + "20" : m.warmWhite,
                                                                    color: active ? uFeed.color : m.warmGrey
                                                                }}
                                                            >
                                                                {level === 3 && <span className="block text-xs">⭐</span>}
                                                                {uFeed.label}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                                <div className="h-2 rounded-full w-full bg-slate-200 overflow-hidden">
                                                    <div className="h-full transition-all duration-300" style={{ width: `${state.utilization / 5 * 100}%`, backgroundColor: utilFeedback.color }} />
                                                </div>
                                            </section>

                                            {/* CHRONOLOGICAL SESSION SLOT GRID */}
                                            <section className="space-y-3">
                                                <h3 style={{ ...textHeaderStyle, fontSize: 17 }} className="flex items-center gap-1.5">
                                                    <Icons.Clock size={18} color={m.gold} /> Telehealth Operations Schedule
                                                </h3>
                                                <div className="space-y-3">
                                                    {state.sessions.map((session, idx) => {
                                                        const client = state.clients.find(c => c.id === session.clientId);
                                                        const hasClient = !!client;
                                                        const baseW = hasClient ? client.weight : 0;
                                                        const intensityMod = session.intensity === "elevated" ? 1.3 : session.intensity === "crisis" ? 1.6 : 1.0;
                                                        const finalLoad = session.ghost || !hasClient ? 0 : baseW * intensityMod;

                                                        let borderStyleColor = m.stone;
                                                        if (!session.ghost && hasClient) {
                                                            borderStyleColor = baseW === 3 ? m.terracotta : baseW === 2 ? m.gold : m.forest;
                                                        }

                                                        return (
                                                            <div key={idx} className="bg-white p-4 rounded-xl border relative transition" style={{ borderColor: m.stone, opacity: session.ghost ? 0.5 : 1, borderLeft: `4px solid ${borderStyleColor}` }}>
                                                                <div className="flex items-center justify-between mb-3">
                                                                    <span className="font-bold text-sm text-slate-800">{session.time}</span>
                                                                    <button 
                                                                        onClick={() => updateSession(idx, { ghost: !session.ghost })}
                                                                        className="px-2.5 py-1 text-xs font-semibold rounded border transition"
                                                                        style={{ 
                                                                            borderColor: session.ghost ? m.stone : "transparent",
                                                                            backgroundColor: session.ghost ? "rgba(109, 120, 115, 0.15)" : "transparent",
                                                                            color: m.warmGrey
                                                                        }}
                                                                    >
                                                                        👻 {session.ghost ? "Ghost Active" : "Late Cancel"}
                                                                    </button>
                                                                </div>

                                                                {!session.ghost ? (
                                                                    <div className="space-y-3">
                                                                        <div className="grid grid-cols-2 gap-3">
                                                                            <select
                                                                                value={session.clientId}
                                                                                onChange={e => updateSession(idx, { clientId: e.target.value })}
                                                                                className="p-2 border rounded-lg text-xs font-semibold focus:outline-none bg-transparent"
                                                                                style={{ borderColor: m.stone, color: m.darkForest }}
                                                                            >
                                                                                <option value="">&mdash; Vacant Session Slot &mdash;</option>
                                                                                {state.clients.map(c => (
                                                                                    <option key={c.id} value={c.id}>{c.name.split(" (")[0]}</option>
                                                                                ))}
                                                                            </select>
                                                                            <select
                                                                                value={session.intensity}
                                                                                onChange={e => updateSession(idx, { intensity: e.target.value })}
                                                                                className="p-2 border rounded-lg text-xs font-semibold focus:outline-none bg-transparent"
                                                                                style={{ borderColor: m.stone, color: m.darkForest }}
                                                                            >
                                                                                <option value="standard">Standard Intensity (1.0x)</option>
                                                                                <option value="elevated">Elevated Demand (1.3x)</option>
                                                                                <option value="crisis">Active Crisis (1.6x)</option>
                                                                            </select>
                                                                        </div>

                                                                        {hasClient && (
                                                                            <div className="flex justify-between items-center text-xs text-slate-500">
                                                                                <span>Baseline Weight: {baseW.toFixed(1)} &times; {intensityMod} modifier</span>
                                                                                <span className="font-bold text-slate-800">{finalLoad.toFixed(1)} CCF Load</span>
                                                                            </div>
                                                                        )}

                                                                        <div className="flex items-center gap-2 mt-2">
                                                                            <button 
                                                                                onClick={() => updateSession(idx, { noteWritten: !session.noteWritten })}
                                                                                className="focus:outline-none"
                                                                            >
                                                                                {session.noteWritten ? <Icons.CircleCheck size={18} color={m.forest} /> : <Icons.Circle size={18} color={m.stone} />}
                                                                            </button>
                                                                            <span className="text-xs font-semibold text-slate-700">
                                                                                {session.noteWritten ? "Progress Note written" : "EHR Note pending"}
                                                                            </span>
                                                                        </div>
                                                                    </div>
                                                                ) : (
                                                                    <p className="text-xs text-slate-400 italic">Ghost Session Active. Workload complexity weight dropped to 0.0.</p>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </section>

                                            {/* CCF TEMPERATURE LEVEL GAUGE */}
                                            <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-3" style={{ borderColor: m.stone }}>
                                                <div className="flex justify-between items-center">
                                                    <h3 style={{ ...textHeaderStyle, fontSize: 16 }}>Clinical Complexity Factor (CCF)</h3>
                                                    <span className="font-bold text-lg" style={{ color: ccfColor }}>{ccfLoad.toFixed(1)} / {dynamicCeiling.toFixed(1)}</span>
                                                </div>
                                                <div className="h-3 rounded-full w-full bg-slate-200 overflow-hidden relative">
                                                    <div className="h-full transition-all duration-300" style={{ width: `${ccfPercentage}%`, backgroundColor: ccfColor }} />
                                                    <div className="absolute top-0 bottom-0 w-0.5 bg-slate-800" style={{ left: `${dynamicCeiling / standardCeiling * 100}%` }} />
                                                </div>
                                                <div className="flex justify-between text-[10px] font-bold text-slate-400">
                                                    <span>0.0 Base</span>
                                                    <span>Safeguard Threshold Limit: {dynamicCeiling.toFixed(1)}</span>
                                                    <span>10.0 Maximum</span>
                                                </div>
                                                {ccfLoad > dynamicCeiling && (
                                                    <div className="p-3 bg-red-50 text-red-700 border border-red-200 rounded-lg text-xs font-semibold flex items-center gap-2">
                                                        <Icons.TriangleAlert size={16} />
                                                        <span>Workload capacity limit breached. Rest blocks and active pacing recommended.</span>
                                                    </div>
                                                )}
                                            </section>

                                        </React.Fragment>
                                    )}

                                </React.Fragment>
                            )}

                            {/* TAB 2: OPERATIONS SANDBOX & EXPORTER */}
                            {state.page === 2 && (
                                <React.Fragment>
                                    
                                    {/* MORNING STARTER CHECKLIST */}
                                    <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-3" style={{ borderColor: m.stone }}>
                                        <h3 style={{ ...textHeaderStyle, fontSize: 16 }} className="flex items-center gap-1.5">
                                            <Icons.Sun size={18} color={m.gold} /> Morning Operations Check
                                        </h3>
                                        <div className="space-y-2">
                                            {morningChecklistTasks.map((task, idx) => (
                                                <label key={idx} style={{ cursor: "pointer" }} className="flex items-center gap-2.5 p-2 rounded-lg text-xs font-semibold text-slate-700 hover:bg-slate-50 transition">
                                                    <button onClick={() => toggleMorningTask(idx)} className="focus:outline-none">
                                                        {state.morningChecklist[idx] ? <Icons.CircleCheck size={18} color={m.forest} /> : <Icons.Circle size={18} color={m.stone} />}
                                                    </button>
                                                    <span style={{ textDecoration: state.morningChecklist[idx] ? "line-through" : "none", opacity: state.morningChecklist[idx] ? 0.6 : 1 }}>
                                                        {task}
                                                    </span>
                                                </label>
                                            ))}
                                        </div>
                                    </section>

                                    {/* EXPORTER AND NOTE SCRATCHPAD */}
                                    <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-3" style={{ borderColor: m.stone }}>
                                        <h3 style={{ ...textHeaderStyle, fontSize: 16 }} className="flex items-center gap-1.5">
                                            <Icons.FileText size={18} color={m.forest} /> Frictionless Note Sandbox
                                        </h3>
                                        <p className="text-xs text-slate-500">Draft rough dictation, insights, or clinical session details directly inside this safe browser container.</p>
                                        <textarea
                                            value={state.scratchpadNotes}
                                            onChange={e => updateState({ scratchpadNotes: e.target.value })}
                                            placeholder="Write session summaries..."
                                            className="w-full h-32 p-3 text-xs border rounded-lg bg-slate-50 focus:outline-none focus:border-stone font-mono"
                                            style={{ borderColor: m.stone, color: m.darkForest }}
                                        />
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => updateState({ scratchpadNotes: "" })} className="text-xs font-semibold text-rose-500 hover:underline">Clear Canvas</button>
                                            <button 
                                                onClick={() => {
                                                    const el = document.createElement('textarea');
                                                    el.value = state.scratchpadNotes;
                                                    document.body.appendChild(el);
                                                    el.select();
                                                    document.execCommand('copy');
                                                    document.body.removeChild(el);
                                                    setInlineMessage({ type: "success", text: "Sandbox draft copied successfully!" });
                                                }}
                                                className="px-3.5 py-1.5 rounded-lg text-xs font-semibold text-white transition hover:opacity-90"
                                                style={{ backgroundColor: m.forest }}
                                            >
                                                Copy Draft Notes
                                            </button>
                                        </div>
                                    </section>

                                    {/* SHUTDOWN AIRLOCK CHECKLIST */}
                                    <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-3" style={{ borderColor: m.stone }}>
                                        <h3 style={{ ...textHeaderStyle, fontSize: 16 }} className="flex items-center gap-1.5">
                                            <Icons.Moon size={18} color={m.forest} /> Afternoon Shutdown Check
                                        </h3>
                                        <div className="space-y-2">
                                            {shutdownChecklistTasks.map((task, idx) => (
                                                <label key={idx} style={{ cursor: "pointer" }} className="flex items-center gap-2.5 p-2 rounded-lg text-xs font-semibold text-slate-700 hover:bg-slate-50 transition">
                                                    <button onClick={() => toggleShutdownTask(idx)} className="focus:outline-none">
                                                        {state.shutdownChecklist[idx] ? <Icons.CircleCheck size={18} color={m.forest} /> : <Icons.Circle size={18} color={m.stone} />}
                                                    </button>
                                                    <span style={{ textDecoration: state.shutdownChecklist[idx] ? "line-through" : "none", opacity: state.shutdownChecklist[idx] ? 0.6 : 1 }}>
                                                        {task}
                                                    </span>
                                                </label>
                                            ))}
                                        </div>
                                        {state.shutdownChecklist.every(Boolean) && (
                                            <div className="p-3 bg-green-50 text-green-700 border border-green-200 rounded-lg text-xs font-semibold text-center animate-fadeIn">
                                                Airlock Sealed. Workday packaged. Go enjoy your recovery space.
                                            </div>
                                        )}
                                    </section>

                                    {/* DUAL RAG-OPTIMIZED MARKDOWN/YAML LOGGER EXPORTER */}
                                    <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-4" style={{ borderColor: m.stone }}>
                                        <div className="flex justify-between items-center border-b pb-2 border-stone/30">
                                            <h3 style={{ ...textHeaderStyle, fontSize: 16 }} className="flex items-center gap-1.5">
                                                <Icons.Sparkles size={18} color={m.gold} /> Obsidian Exporter Engine
                                            </h3>
                                            <button 
                                                onClick={handleCopy}
                                                className="px-3 py-1.5 rounded-lg text-xs font-bold text-white transition flex items-center gap-1"
                                                style={{ backgroundColor: copied ? m.forest : m.darkForest }}
                                            >
                                                {copied ? <Icons.Check size={14} /> : <Icons.Copy size={14} />}
                                                {copied ? "Copied YAML" : "Copy YAML Block"}
                                            </button>
                                        </div>
                                        <pre className="bg-slate-50 p-4 rounded-lg border border-stone/50 text-[11px] text-slate-800 font-mono overflow-x-auto max-h-60 leading-relaxed whitespace-pre-wrap">
                                            {compiledMarkdown}
                                        </pre>
                                    </section>

                                </React.Fragment>
                            )}

                            {/* TAB 3: CLIENT DIRECTORY MANAGER */}
                            {state.page === 3 && (
                                <React.Fragment>
                                    
                                    <section className="bg-white p-4 rounded-xl border border-stone/80 space-y-4" style={{ borderColor: m.stone }}>
                                        <h3 style={{ ...textHeaderStyle, fontSize: 16 }}>Clinical Patient Registry</h3>
                                        <p className="text-xs text-slate-500 leading-relaxed">Define initials, assess complexity weights, and secure data offline inside your local sandbox.</p>
                                        
                                        <div className="p-3.5 bg-slate-50 border border-dashed rounded-lg space-y-3" style={{ borderColor: m.stone }}>
                                            <span className="text-xs font-bold text-slate-700">Add New Profile</span>
                                            <div className="grid grid-cols-2 gap-2">
                                                <input 
                                                    type="text" 
                                                    placeholder="Initials (e.g. Client X)"
                                                    value={newClientName}
                                                    onChange={e => setNewClientName(e.target.value)}
                                                    className="p-2 border rounded text-xs focus:outline-none focus:border-stone bg-white"
                                                    style={{ borderColor: m.stone, color: m.darkForest }}
                                                />
                                                <select
                                                    value={newClientWeight}
                                                    onChange={e => setNewClientWeight(Number(e.target.value))}
                                                    className="p-2 border rounded text-xs focus:outline-none bg-white"
                                                    style={{ borderColor: m.stone, color: m.darkForest }}
                                                >
                                                    <option value={1.0}>Tier 1 - Low Load (1.0)</option>
                                                    <option value={2.0}>Tier 2 - Moderate Load (2.0)</option>
                                                    <option value={3.0}>Tier 3 - Crisis Load (3.0)</option>
                                                </select>
                                            </div>
                                            <button 
                                                onClick={addClient}
                                                className="w-full py-2 bg-slate-800 text-white text-xs font-semibold rounded-lg hover:opacity-90 transition"
                                            >
                                                Register to Client Directory
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                            {state.clients.map(client => (
                                                <div key={client.id} className="p-3 rounded-lg border bg-slate-50 flex items-center justify-between transition hover:border-slate-400" style={{ borderColor: m.stone }}>
                                                    <div>
                                                        <span className="text-xs font-bold text-slate-800">{client.name.split(" (")[0]}</span>
                                                        <span className="block text-[10px] text-slate-400 font-semibold uppercase mt-0.5">Tier {client.weight.toFixed(1)} Weight</span>
                                                    </div>
                                                    {state.clients.length > 3 && (
                                                        <button 
                                                            onClick={() => removeClient(client.id)}
                                                            className="text-stone hover:text-rose-500 p-1 transition"
                                                            title="Delete Client"
                                                        >
                                                            <Icons.Trash2 size={15} />
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                </React.Fragment>
                            )}

                        </div>
                    </div>

                </div>
            );
        }

        const container = document.getElementById("root");
        if (container) {
            ReactDOM.createRoot(container).render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } else {
            document.body.innerHTML = '<div style="padding:40px; color:red;">Missing Root Mount Element</div>';
        }
    </script>
</body>
</html>
