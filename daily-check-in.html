",subcategories:[{name:"Autonomic & Nervous System States",symptoms:[{id:"autonomic-racing",name:"Autonomic Racing",desc:"A persistent physical rushing sensation, characterized by shallow chest breathing, an elevated resting heart rate, or a tense jaw."},{id:"heart-palpitations",name:"Heart Palpitations",desc:""},{id:"thermal-dysregulation",name:"Thermal Dysregulation",desc:"Sudden, unexpected hot flashes or cold spells that do not match the actual ambient room temperature."},{id:"hot-flashes",name:"Hot Flashes",desc:""},{id:"night-sweats",name:"Night Sweats",desc:""},{id:"chills",name:"Chills",desc:"Sensation of feeling cold, often accompanied by involuntary shivering."},{id:"cold-sensitivity",name:"Cold Sensitivity",desc:"Heightened vulnerability or discomfort when exposed to cold environments."},{id:"fever",name:"Fever",desc:"Elevation in internal body temperature above normal range (typically >100.4\xB0F/38\xB0C)."}]},{name:"Energy, Fatigue & Sleep Quality",symptoms:[{id:"fatigue",name:"Fatigue",desc:"A deep, systemic lack of physical or mental energy that rest does not immediately fix; a feeling of running on empty."},{id:"extreme-fatigue",name:"Extreme Fatigue",desc:"Deep, overwhelming exhaustion that isn't relieved by rest."},{id:"physical-exhaustion-threshold",name:"Physical Exhaustion Threshold",desc:"A heavy, lead-like sensation in the limbs where basic physical logistics require massive deliberate effort."},{id:"drowsiness",name:"Drowsiness",desc:"An active, heavy pull toward sleep during waking hours, making it difficult to keep your eyes open or stay alert."},{id:"hard-to-fall-asleep",name:"Hard to Fall Asleep",desc:"Difficulty initiating sleep at the start of the night."},{id:"insomnia",name:"Insomnia",desc:""},{id:"woke-up-refreshed",name:"Woke Up Refreshed",desc:"Feeling restored and energized upon waking."},{id:"fatigue-upon-waking",name:"Fatigue Upon Waking",desc:"Waking up feeling exhausted or unrefreshed despite sleeping."},{id:"restless-sleep",n ain",desc:"Discomfort localized to one or both lower quadrants of the pelvis where the ovaries sit."},{id:"umbilical-pain",name:"Umbilical Pain",desc:"Pain or sensitivity centered directly around or behind the belly button."},{id:"painful-sex",name:"Painful Sex",desc:"Persistent or recurrent genital/pelvic pain experienced before, during, or after sexual intercourse."},{id:"breast-tenderness",name:"Breast Tenderness",desc:"Localized soreness, swelling, or acute sensitivity to touch or clothing pressure, typically driven by cyclical hormonal fluctuations."},{id:"breast-pain",name:"Breast Pain",desc:"Soreness, tenderness, or aching in one or both breasts."},{id:"pms-symptoms",name:"PMS Symptoms",desc:"General physical and emotional symptoms occurring in the luteal phase prior to menstruation."},{id:"pmdd-premenstrual-dysphoric-disorder",name:"PMDD (Premenstrual Dysphoric Disorder)",desc:"A severe form of PMS causing significant mood disturbances, depression, or severe irritability."},{id:"water-retention",name:"Water Retention",desc:"Temporary fluid accumulation causing bloating, puffiness, or minor weight gains."}]},{name:"Vulva & Vagina",symptoms:[{id:"normal-vulva-vagina",name:"Normal (Vulva/Vagina)",desc:"Healthy tissue without itching, pain, or unusual discharge."},{id:"vulvar-burning",name:"Vulvar Burning",desc:"Sharp, stinging, or heat sensations on the external vulvar tissue."},{id:"vulvar-throbbing",name:"Vulvar Throbbing",desc:"A distinct, pulsing ache or localized pressure in the pelvic floor/vulvar region, often linked to pelvic congestion, hormonal shifts, or neural sensitivity."},{id:"vulvar-congestion",name:"Vulvar Congestion",desc:"A heavy, swollen, or engorged feeling in the outer female genital tissue."},{id:"vaginal-dryness",name:"Vaginal Dryness",desc:"Loss of natural moisture and elasticity in the vaginal lining, causing irritation or friction."},{id:"intimate-irritation",name:"Intimate Irritation",desc:"Soreness, itching, or redness across the vu
